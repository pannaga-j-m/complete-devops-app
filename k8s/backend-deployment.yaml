apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-backend
  template:
    metadata:
      labels:
        app: flight-backend
    spec:
      containers:
      - name: backend
        image: pannagajm2004/flight-backend:latest
        ports:
        - containerPort: 3000